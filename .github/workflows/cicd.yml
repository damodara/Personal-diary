name: CI/CD

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    # PostgreSQL в CI не нужен — используем SQLite in-memory
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with flake8
        run: flake8 . --max-line-length=120 --exclude=migrations,staticfiles,__pycache__
      - name: Test with pytest
        env:
          SECRET_KEY: dummy
        run: pytest
      - name: Check Docker build
        run: docker build -t diary .

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.DO_USER }}/Personal-diary

            cat > .env <<EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=db
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            EOF

            git pull origin main

            docker compose down --remove-orphans
            docker compose up -d --build

            sleep 5

            # название сервиса в docker-compose.yml — web
            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput

            sudo systemctl reload nginx   # если nginx на хосте
            docker system prune -f