name: CI/CD

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with flake8
        run: flake8 . --max-line-length=88 --exclude=migrations,staticfiles,__pycache__
      - name: Test with pytest
        env:
          SECRET_KEY: dummy
          NAME: testdb
          USER: testuser
          PASSWORD: testpass
          HOST: localhost
          PORT: 5432
        run: pytest
      - name: Check Docker build
        run: docker build -t diary .

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /Personal-diary   # если папка называется diary, замените на /diary

            # Создать .env файл из секретов
            cat > .env <<EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_USER=postgres
            DB_HOST=db
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            EOF

            git pull origin main

            docker compose down --remove-orphans
            docker compose up -d --build

            sleep 5

            # Имя сервиса — diary (замените, если в docker-compose другое)
            docker compose exec -T diary python manage.py migrate --noinput
            docker compose exec -T diary python manage.py collectstatic --noinput

            sudo systemctl reload nginx   # если nginx на хосте
            docker system prune -f