name: Deploy Django to Server (Docker)

on:
  push:
    branches: [ main ]   # измените на свою ветку, например master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Sync project files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='__pycache__/' \
            --exclude='.env' \
            --exclude='static/' \
            --exclude='media/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/Personal-diary/

      - name: Deploy with Docker on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /Personal-diary

            # Создать .env файл из секретов
            cat > .env <<EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_USER=${{ secrets.DB_USER }}
            DB_HOST=db  # если используете сервис postgres с именем db в docker-compose, иначе укажите localhost
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            # Добавьте другие переменные при необходимости
            EOF

            # Остановить старые контейнеры, пересобрать образы и запустить в фоне
            docker-compose down --remove-orphans
            docker-compose up --build -d

            # Подождать, пока контейнеры поднимутся
            sleep 5

            # Выполнить миграции внутри контейнера Django (название сервиса – 'web' или 'app')
            docker-compose exec -T web python manage.py migrate --noinput

            # Собрать статику (если нужно)
            docker-compose exec -T web python manage.py collectstatic --noinput

            # Перезагрузить Nginx (если он в контейнере) или на хосте
            # Если Nginx на хосте, используйте: sudo systemctl reload nginx
            # Если в контейнере, то рестарт не нужен, т.к. статика смонтирована

      - name: Verify deployment
        run: |
          echo "Deployment completed to ${{ secrets.DO_HOST }}"