name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: 🧪 Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code into Personal-diary folder
        uses: actions/checkout@v4
        with:
          path: Personal-diary # <-- ВАЖНО: указываем путь

      - name: 🐍 Setup Python 3.14
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          # Указываем путь к папке проекта для установки зависимостей
          # Это нужно, чтобы pip установил пакеты в /home/runner/Personal-diary
          working-directory: Personal-diary

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 🔐 Setup .env for tests (SECRET_KEY)
        run: |
          echo "SECRET_KEY=temporary-secret-key-for-tests" > Personal-diary/.env

      - name: 🛢️ Setup PostgreSQL for tests (локально)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          echo "host: localhost" > Personal-diary/.pg_config
          echo "user: postgres" >> Personal-diary/.pg_config

      - name: 🧪 Run tests with coverage
        run: |
          cd Personal-diary && pytest --cov=. --cov-report=xml

      - name: 📊 Upload coverage to Codecov (опционально)
        uses: codecov/codecov-action@v4
        with:
          file: Personal-diary/coverage.xml # Указываем путь к отчету

  deploy-to-vps:
    name: 🚀 Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code into Personal-diary folder (на сервере)
        uses: actions/checkout@v4
        with:
          path: Personal-diary

      - name: 🔐 Setup SSH Key for deployment
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: 🐳 Build Docker Image from Personal-diary folder
        id: build-image
        run: |
          cd Personal-diary
          IMAGE_TAG="your-dockerhub-username/your-repo-name:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: 📤 Push Docker Image to Registry (опционально)
        if: secrets.DOCKERHUB_PASSWORD
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker push ${{ steps.build-image.outputs.IMAGE_TAG }}

      - name: 📡 Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            # Переходим в нужную папку на сервере перед выполнением команд
            cd /root/Personal-diary || cd /home/your_user/Personal-diary

            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin || true

            docker pull ${{ steps.build-image.outputs.IMAGE_TAG }} || true

            docker stop my_django_app || true && docker rm my_django_app || true

            docker run -d \
              --name my_django_app \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -p 8000:8000 \
              ${{ steps.build-image.outputs.IMAGE_TAG }}