name: CI/CD Pipeline

# Запускать при пуше в ветку main и при создании пул-реквеста в main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Часть 1: Тестирование и сборка
  build-and-test:
    name: 🧪 Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.14
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔐 Setup .env for tests (SECRET_KEY)
        run: echo "SECRET_KEY=temporary-secret-key-for-tests" > .env

      - name: 🛢️ Setup PostgreSQL for tests (локально)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          echo "host: localhost" > .pg_config
          echo "user: postgres" >> .pg_config # или твой тестовый юзер

      - name: 🧪 Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml

      - name: 📊 Upload coverage to Codecov (опционально)
        uses: codecov/codecov-action@v4

  # Часть 2: Деплой на VPS (только при пуше в main)
  deploy-to-vps:
    name: 🚀 Deploy to VPS
    needs: build-and-test # Запускается только если тесты прошли успешно
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥