{% extends 'base.html' %}

{% block title %}Удаление записи{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Подтверждение удаления</h4>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить запись <strong>«{{ object.title }}»</strong>?</p>
                <p class="text-muted small">Это действие необратимо.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'diary:entry_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
